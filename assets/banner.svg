<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0a0015"/>
      <stop offset="45%"  stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d2060"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d2060" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle glow blob center -->
  <ellipse cx="600" cy="150" rx="420" ry="120" fill="url(#glow)"/>

  <!-- Grid lines (very subtle) -->
  <line x1="0" y1="60"  x2="1200" y2="60"  stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="200" y1="0"  x2="200" y2="300"  stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="400" y1="0"  x2="400" y2="300"  stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="600" y1="0"  x2="600" y2="300"  stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="800" y1="0"  x2="800" y2="300"  stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="1000" y1="0" x2="1000" y2="300" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- Stars / particles -->
  <circle cx="80"  cy="40"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="210" cy="25"  r="1"   fill="white" opacity="0.4"/>
  <circle cx="380" cy="55"  r="2"   fill="#a855f7" opacity="0.5"/>
  <circle cx="520" cy="20"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="720" cy="45"  r="1"   fill="#06b6d4" opacity="0.6"/>
  <circle cx="880" cy="30"  r="2"   fill="white" opacity="0.4"/>
  <circle cx="1050" cy="50" r="1.5" fill="#ec4899" opacity="0.5"/>
  <circle cx="1150" cy="28" r="1"   fill="white" opacity="0.45"/>
  <circle cx="150" cy="265" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="340" cy="275" r="1"   fill="#a855f7" opacity="0.4"/>
  <circle cx="650" cy="270" r="2"   fill="white" opacity="0.3"/>
  <circle cx="900" cy="260" r="1.5" fill="#06b6d4" opacity="0.45"/>
  <circle cx="1100" cy="280" r="1"  fill="white" opacity="0.35"/>

  <!-- Decorative circles left -->
  <circle cx="70"  cy="150" r="50" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.12"/>
  <circle cx="70"  cy="150" r="32" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.08"/>
  <circle cx="70"  cy="150" r="14" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.06"/>

  <!-- Decorative circles right -->
  <circle cx="1130" cy="150" r="50" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.12"/>
  <circle cx="1130" cy="150" r="32" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.08"/>
  <circle cx="1130" cy="150" r="14" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.06"/>

  <!-- Wave accent top-right -->
  <path d="M900,0 Q1000,30 1100,10 Q1150,5 1200,20 L1200,0 Z" fill="#a855f7" opacity="0.08"/>

  <!-- Wave accent bottom-left -->
  <path d="M0,280 Q100,260 200,280 Q280,295 350,275 L350,300 L0,300 Z" fill="#06b6d4" opacity="0.07"/>

  <!-- Greeting -->
  <text x="600" y="110"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#cccccc"
        text-anchor="middle"
        letter-spacing="6">HI THERE, I'M</text>

  <!-- Main name -->
  <text x="600" y="180"
        font-family="Arial Black, Arial, sans-serif"
        font-size="76"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="6">Rishita Reddy</text>

  <!-- Gradient underline -->
  <rect x="290" y="195" width="620" height="3.5" fill="url(#shine)" rx="2"/>

  <!-- Subtitle -->
  <text x="600" y="238"
        font-family="Arial, sans-serif"
        font-size="17"
        fill="#b0b8d8"
        text-anchor="middle"
        letter-spacing="3">CS STUDENT  ·  WEB DEVELOPER  ·  INDIA</text>
</svg>
