<svg xmlns="http://www.w3.org/2000/svg" width="440" height="175" viewBox="0 0 440 175" role="img" aria-label="GitHub Snapshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1a0f2e"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="438" height="173" rx="14" fill="url(#bg)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="24" y="32" font-family="Segoe UI,Verdana,sans-serif" font-size="16" font-weight="700" fill="#a855f7">GitHub Snapshot</text>
  <line x1="24" y1="44" x2="416" y2="44" stroke="#33285c" stroke-width="1"/>

  <text x="34"  y="92"  font-family="Segoe UI,sans-serif" font-size="30" font-weight="800" fill="#ec4899">22</text>
  <text x="34"  y="112" font-family="Consolas,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#8b93b8">COMMITS</text>

  <text x="244" y="92"  font-family="Segoe UI,sans-serif" font-size="30" font-weight="800" fill="#ec4899">6</text>
  <text x="244" y="112" font-family="Consolas,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#8b93b8">PUBLIC REPOS</text>

  <text x="34"  y="148" font-family="Segoe UI,sans-serif" font-size="30" font-weight="800" fill="#ec4899">4</text>
  <text x="34"  y="168" font-family="Consolas,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#8b93b8">LANGUAGES</text>

  <text x="244" y="148" font-family="Segoe UI,sans-serif" font-size="30" font-weight="800" fill="#ec4899">2023</text>
  <text x="244" y="168" font-family="Consolas,'Courier New',monospace" font-size="11" letter-spacing="2" fill="#8b93b8">ON GITHUB SINCE</text>
