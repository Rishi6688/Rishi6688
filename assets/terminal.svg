<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 270" width="860" height="270">
  <defs>
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .l1 { opacity:0; animation: fadeUp .4s ease  .6s forwards; }
      .l2 { opacity:0; animation: fadeUp .4s ease 1.4s forwards; }
      .l3 { opacity:0; animation: fadeUp .4s ease 2.4s forwards; }
      .l4 { opacity:0; animation: fadeUp .4s ease 3.0s forwards; }
      .l5 { opacity:0; animation: fadeUp .4s ease 3.8s forwards; }
      .l6 { opacity:0; animation: fadeUp .4s ease 4.4s forwards; }
      .l7 { opacity:0; animation: fadeUp .4s ease 5.2s forwards; }
      .l8 { opacity:0; animation: fadeUp .4s ease 5.8s forwards; }
      .cur { animation: blink .75s step-start infinite; }
    </style>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Window shell -->
  <rect width="860" height="270" rx="12" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="860" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="860" height="12" fill="#161b22"/>

  <!-- Top accent line -->
  <rect width="860" height="2" rx="1" fill="url(#bar)" opacity=".7"/>

  <!-- Traffic-light dots -->
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="430" y="25" font-family="'Courier New',monospace" font-size="12" fill="#6e7681" text-anchor="middle">rishita@dev  ~  /projects</text>

  <!-- ── Line 1 : prompt ── -->
  <g class="l1">
    <text x="24" y="72" font-family="'Courier New',monospace" font-size="13" fill="#a855f7">❯ </text>
    <text x="44" y="72" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">whoami</text>
  </g>

  <!-- ── Line 2 : output ── -->
  <g class="l2">
    <text x="24" y="95" font-family="'Courier New',monospace" font-size="13" fill="#28c840">Rishita Reddy</text>
    <text x="150" y="95" font-family="'Courier New',monospace" font-size="13" fill="#6e7681"> — CS Student &amp; Web Developer 🚀</text>
  </g>

  <!-- ── Line 3 : prompt ── -->
  <g class="l3">
    <text x="24" y="126" font-family="'Courier New',monospace" font-size="13" fill="#a855f7">❯ </text>
    <text x="44" y="126" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">cat skills.txt</text>
  </g>

  <!-- ── Line 4 : output ── -->
  <g class="l4">
    <text x="24" y="149" font-family="'Courier New',monospace" font-size="13" fill="#06b6d4">[ HTML5  CSS3  JavaScript  Java  Python  Git ]</text>
  </g>

  <!-- ── Line 5 : prompt ── -->
  <g class="l5">
    <text x="24" y="180" font-family="'Courier New',monospace" font-size="13" fill="#a855f7">❯ </text>
    <text x="44" y="180" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">git log --oneline --graph</text>
  </g>

  <!-- ── Line 6 : commit ── -->
  <g class="l6">
    <text x="24" y="203" font-family="'Courier New',monospace" font-size="13" fill="#ec4899">* a3f8c2d </text>
    <text x="128" y="203" font-family="'Courier New',monospace" font-size="13" fill="#6e7681">🎬 Built Allien — Movie &amp; Event Ticket Booking Platform</text>
  </g>

  <!-- ── Line 7 : commit ── -->
  <g class="l7">
    <text x="24" y="222" font-family="'Courier New',monospace" font-size="13" fill="#ec4899">* 9d12e77 </text>
    <text x="128" y="222" font-family="'Courier New',monospace" font-size="13" fill="#6e7681">✨ Interactive seat booking with 100-seat grid</text>
  </g>

  <!-- ── Line 8 : next prompt + blinking cursor ── -->
  <g class="l8">
    <text x="24" y="250" font-family="'Courier New',monospace" font-size="13" fill="#a855f7">❯ </text>
    <rect class="cur" x="44" y="237" width="8" height="15" rx="1" fill="#a855f7"/>
  </g>
</svg>
